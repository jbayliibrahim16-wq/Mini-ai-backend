<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #343541; color: #ececf1; height: 100vh; display: flex; }
        .sidebar { width: 260px; background: #202123; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .new-chat { border: 1px solid #4d4d4f; border-radius: 6px; padding: 12px; cursor: pointer; text-align: center; }
        .new-chat:hover { background: #2a2b32; }
        .chat-container { flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; height: 100vh; }
        .messages { flex: 1; overflow-y: auto; padding: 20px 10px; }
        .message { display: flex; gap: 20px; padding: 20px 10px; border-bottom: 1px solid #2a2b32; }
        .message.user { background: #343541; }
        .message.bot { background: #444654; }
        .avatar { width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .user .avatar { background: #5436da; }
        .bot .avatar { background: #19c37d; }
        .content { flex: 1; line-height: 1.6; white-space: pre-wrap; }
        .input-area { padding: 20px 10px; background: #343541; border-top: 1px solid #2a2b32; }
        .input-box { position: relative; max-width: 768px; margin: 0 auto; }
        textarea { width: 100%; background: #40414f; border: 1px solid #565869; border-radius: 12px; padding: 12px 45px 12px 15px; color: #ececf1; font-size: 16px; resize: none; font-family: inherit; max-height: 200px; }
        textarea:focus { outline: none; border-color: #6b6c7b; }
        .send-btn { position: absolute; left: 8px; bottom: 8px; background: #19c37d; border: none; border-radius: 6px; width: 30px; height: 30px; cursor: pointer; color: white; }
        .send-btn:disabled { background: #40414f; cursor: not-allowed; }
        .typing { display: flex; gap: 4px; padding: 10px 0; }
        .typing span { width: 8px; height: 8px; background: #8e8ea0; border-radius: 50%; animation: bounce 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        @media (max-width: 768px) { .sidebar { display: none; } .message { padding: 15px 5px; gap: 10px; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="new-chat" onclick="newChat()">+ محادثة جديدة</div>
    </div>
    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="message bot">
                <div class="avatar">AI</div>
                <div class="content">مرحبا! انا Mini AI. كيف فيني ساعدك اليوم؟ 🔥</div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-box">
                <textarea id="input" placeholder="اكتب رسالتك هنا..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    <script>
        const API_URL = '/api/chat';
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        let chatHistory = [];
        function autoResize(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }
        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        function newChat() { chatHistory = []; messagesEl.innerHTML = `<div class="message bot"><div class="avatar">AI</div><div class="content">مرحبا! انا Mini AI. كيف فيني ساعدك اليوم؟ 🔥</div></div>`; }
        async function sendMessage() {
            const text = inputEl.value.trim(); if (!text) return;
            addMessage('user', text); inputEl.value = ''; inputEl.style.height = 'auto'; sendBtn.disabled = true;
            const typingId = addTyping();
            try {
                const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: text, history: chatHistory }) });
                const data = await res.json(); removeTyping(typingId);
                if (data.reply) { addMessage('bot', data.reply); chatHistory.push({ role: 'user', content: text }); chatHistory.push({ role: 'assistant', content: data.reply }); }
                else { addMessage('bot', 'صار خطأ، جرب مرة تانية'); }
            } catch (err) { removeTyping(typingId); addMessage('bot', 'ما قدرت اتصل بالسيرفر'); }
            sendBtn.disabled = false; inputEl.focus();
        }
        function addMessage(role, text) { const div = document.createElement('div'); div.className = `message ${role}`; div.innerHTML = `<div
